name: CI Docker Build & Push

on:
  push:
    branches:
      - master

jobs:
  docker:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: sitewebduprof
      IMAGE_TAG: latest
      DOCKER_REGISTRY: aichalo

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Connexion à Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build de l'image Docker
        run: |
          docker build -t $DOCKER_REGISTRY/$IMAGE_NAME:$IMAGE_TAG .

      - name: Test de l'image Docker
        run: |
         docker image ls $DOCKER_REGISTRY/$IMAGE_NAME:$IMAGE_TAG

      - name: Push de l'image Docker
        run: |
         docker push $DOCKER_REGISTRY/$IMAGE_NAME:$IMAGE_TAG

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
            image-ref: 'aichalo/sitewebduprof:latest'
            format: table
            severity: HIGH,CRITICAL
            exit-code: 1
            vuln-type: os,library
            ignore-unfixed: true
            trivyignores: .trivyignore

  helm-deploy:
    runs-on: self-hosted
    needs: docker

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Configurer kubectl (kubeconfig)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$HOME\.kube" | Out-Null
          $decoded = [System.Convert]::FromBase64String("${{ secrets.KUBECONFIG }}")
          [System.IO.File]::WriteAllBytes("$HOME\.kube\config", $decoded)

      - name: Vérifier la connexion au cluster
        shell: pwsh
        run: |
          kubectl cluster-info
          kubectl get nodes

      - name: Installer Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Ajouter le repo Bitnami
        shell: pwsh
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update

      - name: Déployer NGINX custom (Partie 3)
        shell: pwsh
        run: |
          helm upgrade --install my-nginx-custom bitnami/nginx `
            -f helm/nginx-values.yaml `
            --wait --timeout 2m

      - name: Déployer Apache (Exercice 1)
        shell: pwsh
        run: |
          helm upgrade --install my-apache bitnami/apache `
            -f helm/apache-values.yaml `
            --wait --timeout 2m

      - name: Déployer MongoDB (Exercice 3)
        shell: pwsh
        run: |
          helm upgrade --install my-mongodb bitnami/mongodb `
            -f helm/mongodb-values.yaml `
            --wait --timeout 3m

      - name: Lister les releases Helm
        shell: pwsh
        run: |
          helm list

      - name: Vérifier les pods déployés
        shell: pwsh
        run: |
          kubectl get pods
          kubectl get svc

  runner:
    runs-on: self-hosted

    steps:
      - name: utilisation du runner self-hosted
        shell: pwsh
        run: |
          Write-Host "$env:COMPUTERNAME is running the self-hosted runner"
