# Exercice 3 : Déployer MongoDB avec personnalisation avancée
auth:
  enabled: true
  rootPassword: "root123"
  username: "appuser"
  password: "apppass123"
  database: "appdb"

replicaCount: 1

persistence:
  enabled: true
  size: 1Gi

service:
  type: ClusterIP

resources:
  requests:
    memory: "256Mi"
    cpu: "250m"
  limits:
    memory: "512Mi"
    cpu: "500m"
